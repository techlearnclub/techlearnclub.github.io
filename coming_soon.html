<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something Is Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Reset */
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {
      font-family: 'Roboto', sans-serif;
      background: #f5f5f7;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .coming-soon-container {
      max-width: 500px;
      padding: 40px 20px;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .coming-soon-container h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .coming-soon-container p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 20px;
    }
    .signup-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .signup-form input {
      padding: 12px 15px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 25px;
      outline: none;
      transition: border-color 0.3s;
    }
    .signup-form input:focus { border-color: #0071e3; }
    .signup-form button {
      padding: 12px 20px;
      font-size: 1rem;
      background-color: #0071e3;
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .signup-form button:hover { background-color: #005bb5; }
    .footer-text {
      font-size: 0.9rem;
      color: #888;
      margin-top: 25px;
    }
  </style>
</head>
<body>
  <div class="coming-soon-container">
    <h1>Something is Coming Soon</h1>
    <p>We're building something amazing to help you learn technology.</p>
    <p>Sign up to be notified when we launch:</p>
    <form class="signup-form">
      <input type="email" placeholder="Enter your email" required>
      <button type="submit">Notify Me</button>
    </form>
    <p class="footer-text">&copy; 2026 WeProgram Technologies</p>
  </div>
</body>
</html>
